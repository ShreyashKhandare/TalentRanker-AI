<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RankLayer AI | Neural Recruitment Intelligence</title>
    <link href="/static/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #ffffff;
            --text-secondary: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --gradient-start: #38bdf8;
            --gradient-end: #818cf8;
            --input-bg: #1e293b;
            --input-border: #334155;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-secondary: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #334155;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --gradient-start: #2563eb;
            --gradient-end: #4f46e5;
            --input-bg: #FFFFFF;
            --input-border: #CBD5E1;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .glass {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .upload-area {
            border: 2px dashed var(--input-border);
            transition: all 0.2s ease;
        }

        .upload-area:hover {
            border-color: var(--gradient-start);
            background-color: rgba(56, 189, 248, 0.05);
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12 animate__animated animate__fadeIn">
            <div>
                <h1 class="text-4xl font-extrabold gradient-text tracking-tighter">RankLayer AI</h1>
                <p class="text-slate-400 text-[10px] font-bold mt-1 uppercase tracking-[0.4em]">Neural Ranking Engine
                    v2.1</p>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="toggleTheme()" class="p-2.5 rounded-xl border border-slate-700 glass transition-all">
                    <svg id="theme-icon" class="w-5 h-5 text-sky-400" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M21.12,15.46A9,9,0,1,1,8.54,2.88,9,9,0,0,0,21.12,15.46Z" />
                    </svg>
                </button>
                <span
                    class="hidden md:block px-4 py-1.5 rounded-full border border-sky-500/30 text-sky-500 text-xs font-bold font-mono bg-sky-500/5">NDCG:
                    0.9788</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <section class="glass p-8 rounded-3xl animate__animated animate__slideInLeft">
                <h2 class="text-2xl font-bold mb-6 flex items-center">
                    <span class="mr-3">📈</span> Analysis Input
                </h2>

                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Resume
                            Content</label>
                        <div class="space-y-4">
                            <div id="drop-zone"
                                class="upload-area flex flex-col items-center justify-center w-full h-36 rounded-2xl cursor-pointer bg-slate-900/20 relative">
                                <div class="flex flex-col items-center justify-center pointer-events-none">
                                    <svg class="w-10 h-10 mb-3 text-sky-500" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                                    </svg>
                                    <p class="mb-1 text-sm"><span class="font-bold">Drop PDF here</span> or click to
                                        browse</p>
                                    <p id="upload-status" class="text-xs text-slate-500">Supported: PDF (Max 5MB)</p>
                                </div>
                            </div>
                            <input id="pdf-upload" type="file" class="hidden" accept=".pdf" />

                            <div id="pdf-info"
                                class="hidden p-4 bg-emerald-500/10 rounded-xl border border-emerald-500/30 flex items-center justify-between animate__animated animate__fadeIn">
                                <div class="flex items-center space-x-3">
                                    <span class="text-xl">📄</span>
                                    <span id="pdf-filename"
                                        class="text-sm font-bold text-emerald-500 truncate max-w-[200px]">filename.pdf</span>
                                </div>
                                <button type="button" onclick="clearPDF()"
                                    class="text-xs font-black text-red-500 uppercase tracking-tighter hover:text-red-400">Remove</button>
                            </div>

                            <textarea id="resume"
                                class="w-full h-44 rounded-2xl p-5 text-sm glass text-white placeholder-slate-500 focus:ring-2 focus:ring-sky-500 outline-none"
                                placeholder="Extracted text will appear here..."></textarea>
                        </div>
                    </div>

                    <div>
                        <label for="job"
                            class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Job
                            Description</label>
                        <textarea id="job"
                            class="w-full h-44 rounded-2xl p-5 text-sm glass text-white placeholder-slate-500 focus:ring-2 focus:ring-sky-500 outline-none"
                            placeholder="Paste the target job description here..."></textarea>
                    </div>

                    <button onclick="analyzeMatch()" id="analyze-btn"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-5 rounded-2xl transition-all shadow-xl flex items-center justify-center space-x-2">
                        <span>Analyze Career Fit</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </button>
                </div>
            </section>

            <section id="results-container" class="glass p-8 rounded-3xl hidden">
                <div class="flex justify-between items-start mb-8">
                    <h2 class="text-2xl font-bold">Match Intelligence</h2>
                    <div id="verdict-badge"
                        class="px-4 py-1 rounded-full text-[10px] font-black uppercase bg-emerald-500/20 text-emerald-500">
                        Strong Match</div>
                </div>

                <div
                    class="flex flex-col items-center justify-center py-10 bg-slate-500/5 rounded-3xl mb-8 border border-slate-200/10">
                    <span id="score-val" class="text-7xl font-black gradient-text">0%</span>
                    <span class="text-slate-500 text-xs mt-3 font-bold uppercase tracking-[0.2em]">Compatibility
                        Score</span>
                </div>

                <div class="p-5 bg-indigo-600/5 border border-indigo-600/10 rounded-2xl">
                    <p id="explanation" class="text-sm font-medium leading-relaxed text-slate-300"></p>
                </div>
            </section>

            <div id="status" class="hidden p-4 bg-slate-500/10 rounded-xl border border-slate-200/10">
                <p class="text-sm font-medium text-slate-300">Status: Ready</p>
            </div>

            <div id="full" class="hidden p-4 bg-slate-500/10 rounded-xl border border-slate-200/10">
                <pre class="text-xs text-slate-400 whitespace-pre-wrap">Response will appear here...</pre>
            </div>

            <div id="loader"
                class="hidden flex flex-col items-center justify-center p-20 glass rounded-3xl lg:col-span-1">
                <div class="animate-spin rounded-full h-16 w-16 border-4 border-slate-700 border-t-sky-500"></div>
                <p class="mt-6 font-bold text-slate-400 animate-pulse text-xs tracking-widest">RANKING LAYER ACTIVE...
                </p>
            </div>
        </div>
    </div>

    <script defer>
        // AUTO switch between local and deployed backend
        const API_BASE =
            window.location.hostname === "localhost" ||
                window.location.hostname === "127.0.0.1"
                ? "http://127.0.0.1:8000"
                : "https://talentranker-ai.onrender.com";

        document.addEventListener('DOMContentLoaded', () => {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('pdf-upload');
            const pdfInfo = document.getElementById('pdf-info');
            const pdfFileName = document.getElementById('pdf-filename');
            const resumeArea = document.getElementById('resume');
            const uploadStatus = document.getElementById('upload-status');

            console.log('PDF Upload Handler Initialized', { dropZone, fileInput, pdfInfo });

            // Trigger file browser on click
            dropZone.addEventListener('click', (e) => {
                e.stopPropagation();
                console.log('Drop zone clicked');
                fileInput.click();
            });

            // Handle File Selection
            fileInput.addEventListener('change', function (e) {
                console.log('File input changed', this.files);
                if (this.files && this.files[0]) {
                    handleFile(this.files[0]);
                }
            });

            // Handle Drag & Drop
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.stopPropagation();
                console.log('File dragged over');
                dropZone.classList.add('border-sky-400', 'bg-sky-400/10');
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.stopPropagation();
                dropZone.classList.remove('border-sky-400', 'bg-sky-400/10');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                console.log('File dropped', e.dataTransfer.files);
                dropZone.classList.remove('border-sky-400', 'bg-sky-400/10');
                if (e.dataTransfer.files.length > 0) {
                    handleFile(e.dataTransfer.files[0]);
                }
            });

            async function handleFile(file) {
                console.log('Handling file:', file.name, file.type, file.size);

                if (file.type !== "application/pdf") {
                    alert("Please upload a PDF file.");
                    return;
                }

                // 1. Update UI Immediately
                console.log('Updating UI for file:', file.name);
                pdfFileName.textContent = file.name;
                pdfInfo.classList.remove('hidden');
                uploadStatus.textContent = "Extracting intelligence...";
                uploadStatus.classList.remove('text-slate-500');
                uploadStatus.classList.add('text-sky-400', 'animate-pulse');

                let timeoutId;

                try {
                    const controller = new AbortController();
                    timeoutId = setTimeout(() => controller.abort(), 10000);

                    const formData = new FormData();
                    formData.append('file', file);

                    const response = await fetch(`${API_BASE}/extract-pdf`, {
                        method: 'POST',
                        body: formData,
                        signal: controller.signal
                    });

                    console.log('Response status:', response.status, response.ok);
                    const data = await response.json();
                    console.log('Response data:', data);

                    if (response.ok && data.extracted_text) {
                        console.log('Extraction successful, text length:', data.extracted_text.length);
                        resumeArea.value = data.extracted_text;
                        uploadStatus.textContent = "Extraction complete! ✓";
                        uploadStatus.classList.remove('animate-pulse', 'text-sky-400');
                        uploadStatus.classList.add('text-emerald-400');
                    } else if (data.error) {
                        console.error('Extraction error:', data.error);
                        uploadStatus.textContent = "Extraction failed: " + data.error;
                        uploadStatus.classList.remove('animate-pulse', 'text-sky-400');
                        uploadStatus.classList.add('text-red-400');
                    } else {
                        console.error('Invalid response:', data);
                        uploadStatus.textContent = "Extraction failed: Invalid response";
                        uploadStatus.classList.remove('animate-pulse', 'text-sky-400');
                        uploadStatus.classList.add('text-red-400');
                    }
                } catch (error) {
                    console.error("Upload error:", error);
                    uploadStatus.textContent = "Server connection failed: " + error.message;
                    uploadStatus.classList.remove('animate-pulse', 'text-sky-400');
                    uploadStatus.classList.add('text-red-400');
                } finally {
                    clearTimeout(timeoutId);
                }
            };

            // These need to be global for the onclick attributes
            function clearPDF() {
                document.getElementById('pdf-upload').value = '';
                document.getElementById('pdf-info').classList.add('hidden');
                document.getElementById('resume').value = '';
                document.getElementById('upload-status').textContent = "Supported: PDF (Max 5MB)";
                document.getElementById('upload-status').className = "text-xs text-slate-500";
            }

            async function analyzeMatch() {
                const resume = document.getElementById('resume').value;
                const job = document.getElementById('job').value;
                const pdfFile = document.getElementById('pdf-upload').files[0];
                const results = document.getElementById('results-container');
                const loader = document.getElementById('loader');

                console.log('DEBUG analyzeMatch - resume length:', resume.length, 'job length:', job.length);
                console.log('DEBUG analyzeMatch - resume:', resume.substring(0, 100) + '...');
                console.log('DEBUG analyzeMatch - job:', job.substring(0, 100) + '...');

                if (!resume && !pdfFile) {
                    alert("Please provide either resume text or upload a PDF file.");
                    return;
                }

                if (!job) {
                    alert("Please provide job description.");
                    return;
                }

                results.classList.add('hidden');
                loader.classList.remove('hidden');

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);

                try {
                    let response;

                    // Use FormData for multipart requests (supports PDF upload)
                    const formData = new FormData();

                    // Prioritize extracted text over file upload
                    if (resume && resume.trim()) {
                        formData.append('resume', resume);
                    } else if (pdfFile) {
                        formData.append('file', pdfFile);
                    }
                    formData.append('jobs', job);

                    response = await fetch(`${API_BASE}/rank`, {
                        method: 'POST',
                        body: formData,
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        throw new Error(`HTTP error! Status: ${response.status}`);
                    }

                    const data = await response.json();
                    console.log("API Response:", data);

                    loader.classList.add('hidden');
                    results.classList.remove('hidden');

                    if (data.match_score !== undefined) {
                        const score = (data.match_score * 100).toFixed(1);
                        document.getElementById('score-val').innerText = score + "%";
                        document.getElementById('explanation').innerText = data.explanation || "Analysis complete.";

                        const badge = document.getElementById('verdict-badge');
                        badge.className = score > 75
                            ? "px-4 py-1 rounded-full text-[10px] font-black uppercase bg-emerald-500/20 text-emerald-500"
                            : "px-4 py-1 rounded-full text-[10px] font-black uppercase bg-amber-500/20 text-amber-500";
                        badge.innerText = score > 75 ? "Strong Match" : "Potential Gap";
                    }
                } catch (err) {
                    clearTimeout(timeoutId);
                    loader.classList.add('hidden');
                    console.error('Analysis error:', err);
                    document.getElementById('status').innerText = "Status: ERROR";
                    document.getElementById('full').innerText = err.message;
                } finally {
                    clearTimeout(timeoutId);
                }
            };
        });

        // Make functions globally accessible for onclick handlers
        window.analyzeMatch = analyzeMatch;
        window.clearPDF = clearPDF;
        window.toggleTheme = toggleTheme;
    </script>
</body>

</html>
