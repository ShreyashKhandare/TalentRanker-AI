<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RankLayer AI | Neural Recruitment Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #ffffff;
            --text-secondary: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --gradient-start: #38bdf8;
            --gradient-end: #818cf8;
            --input-bg: #1e293b;
            --input-border: #334155;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-secondary: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #334155;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --gradient-start: #2563eb;
            --gradient-end: #4f46e5;
            --input-bg: #FFFFFF;
            --input-border: #CBD5E1;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .glass {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .upload-area {
            border: 2px dashed var(--input-border);
            transition: all 0.2s ease;
        }

        .upload-area:hover {
            border-color: var(--gradient-start);
            background-color: rgba(56, 189, 248, 0.05);
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12 animate__animated animate__fadeIn">
            <div>
                <h1 class="text-4xl font-extrabold gradient-text tracking-tighter">RankLayer AI</h1>
                <p class="text-slate-400 text-[10px] font-bold mt-1 uppercase tracking-[0.4em]">Neural Ranking Engine
                    v2.1</p>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="toggleTheme()" class="p-2.5 rounded-xl border border-slate-700 glass transition-all">
                    <svg id="theme-icon" class="w-5 h-5 text-sky-400" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M21.12,15.46A9,9,0,1,1,8.54,2.88,9,9,0,0,0,21.12,15.46Z" />
                    </svg>
                </button>
                <span
                    class="hidden md:block px-4 py-1.5 rounded-full border border-sky-500/30 text-sky-500 text-xs font-bold font-mono bg-sky-500/5">NDCG:
                    0.9788</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <section class="glass p-8 rounded-3xl animate__animated animate__slideInLeft">
                <h2 class="text-2xl font-bold mb-6 flex items-center">
                    <span class="mr-3">📈</span> Analysis Input
                </h2>

                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Resume
                            Content</label>
                        <div class="space-y-4">
                            <label for="pdf-upload" id="drop-zone"
                                class="upload-area flex flex-col items-center justify-center w-full h-36 rounded-2xl cursor-pointer bg-slate-900/20">
                                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                    <svg class="w-10 h-10 mb-3 text-sky-500" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                                    </svg>
                                    <p class="mb-1 text-sm"><span class="font-bold">Drop PDF here</span> or click to
                                        browse</p>
                                    <p id="upload-status" class="text-xs text-slate-500">Supported: PDF (Max 5MB)</p>
                                </div>
                                <input id="pdf-upload" type="file" class="hidden" accept=".pdf"
                                    onchange="handlePDFUpload(event)" />
                            </label>

                            <div id="pdf-info"
                                class="hidden p-4 bg-emerald-500/5 rounded-xl border border-emerald-500/20 flex items-center justify-between">
                                <div class="flex items-center space-x-3">
                                    <div class="p-2 bg-emerald-500/20 rounded-lg text-emerald-600">📄</div>
                                    <span id="pdf-filename" class="text-sm font-semibold"></span>
                                </div>
                                <button onclick="clearPDF()"
                                    class="text-xs font-bold text-red-500 hover:underline">Remove</button>
                            </div>

                            <textarea id="resume"
                                class="w-full h-44 rounded-2xl p-5 text-sm glass text-white placeholder-slate-500 focus:ring-2 focus:ring-sky-500 outline-none"
                                placeholder="Extracted text will appear here or paste manually..."></textarea>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Job
                            Description</label>
                        <textarea id="job"
                            class="w-full h-44 rounded-2xl p-5 text-sm glass text-white placeholder-slate-500 focus:ring-2 focus:ring-sky-500 outline-none"
                            placeholder="Paste the target job description here..."></textarea>
                    </div>

                    <button onclick="analyzeMatch()" id="analyze-btn"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-5 rounded-2xl transition-all shadow-xl flex items-center justify-center space-x-2">
                        <span>Analyze Career Fit</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </button>
                </div>
            </section>

            <section id="results-container" class="glass p-8 rounded-3xl hidden">
                <div class="flex justify-between items-start mb-8">
                    <h2 class="text-2xl font-bold">Match Intelligence</h2>
                    <div id="verdict-badge"
                        class="px-4 py-1 rounded-full text-[10px] font-black uppercase bg-emerald-500/20 text-emerald-500">
                        Strong Match</div>
                </div>

                <div
                    class="flex flex-col items-center justify-center py-10 bg-slate-500/5 rounded-3xl mb-8 border border-slate-200/10">
                    <span id="score-val" class="text-7xl font-black gradient-text">0%</span>
                    <span class="text-slate-500 text-xs mt-3 font-bold uppercase tracking-[0.2em]">Compatibility
                        Score</span>
                </div>

                <div class="p-5 bg-indigo-600/5 border border-indigo-600/10 rounded-2xl">
                    <p id="explanation" class="text-sm font-medium leading-relaxed text-slate-300"></p>
                </div>
            </section>

            <div id="loader"
                class="hidden flex flex-col items-center justify-center p-20 glass rounded-3xl lg:col-span-1">
                <div class="animate-spin rounded-full h-16 w-16 border-4 border-slate-700 border-t-sky-500"></div>
                <p class="mt-6 font-bold text-slate-400 animate-pulse text-xs tracking-widest">RANKING LAYER ACTIVE...
                </p>
            </div>
        </div>
    </div>

    <script>
        console.log("JS LOADED");

        function toggleTheme() {
            const body = document.documentElement;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        }

        async function handlePDFUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('pdf-filename').textContent = file.name;
            document.getElementById('pdf-info').classList.remove('hidden');

            const formData = new FormData();
            formData.append("file", file);

            try {
                const res = await fetch("/rank", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();
                console.log("API response:", data);

                if (data.extracted_text) {
                    document.getElementById('resume').value = data.extracted_text;
                } else {
                    alert("No text extracted");
                }

            } catch (err) {
                console.error(err);
                alert("Upload failed");
            }
        }

        async function analyzeMatch() {
            const resume = document.getElementById('resume').value;
            const job = document.getElementById('job').value;
            const results = document.getElementById('results-container');
            const loader = document.getElementById('loader');

            if (!resume || !job) {
                alert("Please provide both resume and job description.");
                return;
            }

            results.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const response = await fetch('/rank', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resume, jobs: [job] })
                });

                const data = await response.json();

                loader.classList.add('hidden');
                results.classList.remove('hidden');

                if (data.match_score !== undefined) {
                    const finalScore = (data.match_score * 100).toFixed(1);
                    document.getElementById('score-val').innerText = finalScore + "%";
                    document.getElementById('explanation').innerText = data.explanation || "Analysis completed";
                }
            } catch (err) {
                loader.classList.add('hidden');
                alert("Analysis failed");
            }
        }

        function clearPDF() {
            document.getElementById('pdf-upload').value = '';
            document.getElementById('pdf-info').classList.add('hidden');
            document.getElementById('resume').value = '';
        }

        // Initialize drag-drop when DOM is ready
        document.addEventListener('DOMContentLoaded', function () {
            console.log("DOM loaded - setting up drag-drop");

            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('pdf-upload');

            if (!dropZone || !fileInput) {
                console.error("Drop zone or file input not found!");
                return;
            }

            // Simple drag-drop setup
            dropZone.addEventListener('dragover', function (e) {
                e.preventDefault();
                dropZone.style.borderColor = '#38bdf8';
                dropZone.style.backgroundColor = 'rgba(56, 189, 248, 0.1)';
            });

            dropZone.addEventListener('dragleave', function (e) {
                e.preventDefault();
                dropZone.style.borderColor = '';
                dropZone.style.backgroundColor = '';
            });

            dropZone.addEventListener('drop', function (e) {
                e.preventDefault();
                dropZone.style.borderColor = '';
                dropZone.style.backgroundColor = '';

                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    const file = files[0];
                    if (file.name.toLowerCase().endsWith('.pdf')) {
                        fileInput.files = files;
                        handlePDFUpload({ target: fileInput });
                    } else {
                        alert('Please select a PDF file only.');
                    }
                }
            });

            console.log("Drag-drop setup complete");

            // Simple test - add click handler to verify JS is working
            dropZone.addEventListener('click', function () {
                console.log("Drop zone clicked - opening file picker");
                fileInput.click();
            });

        });
    </script>
</body>

</html>
