    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Mode (Default) */
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #ffffff;
            --text-secondary: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --gradient-start: #38bdf8;
            --gradient-end: #818cf8;
            --input-bg: #1e293b;
            --input-border: #334155;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            /* Elite Light Mode Palette */
            --bg-primary: #F8FAFC;
            /* Soft off-white */
            --bg-secondary: #FFFFFF;
            /* Pure white for cards */
            --text-primary: #0F172A;
            /* Deep Navy for high contrast */
            --text-secondary: #334155;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --glass-bg: #FFFFFF;
            --gradient-start: #2563eb;
            --gradient-end: #4f46e5;
            --input-bg: #FFFFFF;
            --input-border: #CBD5E1;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .glass:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        textarea,
        .upload-area {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--input-border) !important;
            color: var(--text-primary) !important;
            transition: all 0.2s ease;
        }

        textarea:focus,
        .upload-area:hover {
            border-color: var(--gradient-start) !important;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1) !important;
            outline: none;
        }

        .text-slate-400,
        .text-slate-500 {
            color: var(--text-muted);
        }

        .text-slate-300 {
            color: var(--text-secondary);
        }

        .bg-slate-900\/50 {
            background-color: var(--input-bg);
        }

        .border-slate-700,
        .border-slate-600 {
            border-color: var(--input-border);
        }

        /* Specific fix for the Upload Area in Light Mode */
        [data-theme="light"] .upload-area {
            background-color: #F1F5F9 !important;
            border-style: dashed !important;
        }
    </style>
</head>

                        function clearPDF() {
                            // Reset file input

                        function clearJobDescription() {
                            document.getElementById('job').value = '';
                        // Focus on the cleared textarea for better UX

                        async function analyzeMatch() {
            const btn = document.getElementById('btn');
                        const loader = document.getElementById('loader');
                        const results = document.getElementById('results-container');

                        // UI State Change
                        btn.disabled = true;
                        loader.classList.remove('hidden');
                        results.classList.add('hidden');

                        const payload = {
                            resume: document.getElementById('resume').value,
                        jobs: [document.getElementById('job').value]
            };

                        try {
                const response = await fetch('/rank', {
                            method: 'POST',
                        headers: {'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                });
                        const data = await response.json();

                        displayResults(data);
            } catch (err) {
                            alert("Server connection failed. Check if API is running!");
            } finally {
                            btn.disabled = false;
                        loader.classList.add('hidden');
            }
        }

                        function displayResults(data) {
            const results = document.getElementById('results-container');
                        const badge = document.getElementById('verdict-badge');

                        results.classList.remove('hidden');

                        // Use the match_score from API response
                        const score = data.match_score || 0;
                        document.getElementById('score-val').innerText = (score * 100).toFixed(1) + "%";
                        document.getElementById('explanation').innerText = data.explanation || "Analysis completed successfully.";

            // Badge Color
            if (score > 0.8) {
                            badge.className = "px-5 py-1.5 rounded-full text-[10px] font-black uppercase tracking-tighter bg-emerald-500/20 text-emerald-600 border border-emerald-500/30";
                        badge.innerText = "STRONG MATCH";
            } else if (score > 0.6) {
                            badge.className = "px-5 py-1.5 rounded-full text-[10px] font-black uppercase tracking-tighter bg-amber-500/20 text-amber-600 border border-amber-500/30";
                        badge.innerText = "GOOD MATCH";
            } else {
                            badge.className = "px-5 py-1.5 rounded-full text-[10px] font-black uppercase tracking-tighter bg-red-500/20 text-red-600 border border-red-500/30";
                        badge.innerText = "WEAK MATCH";
            }

                        // Render Progress Bars with real API data
                        const contribContainer = document.getElementById('contributions');
                        contribContainer.innerHTML = '';

                        // Use real feature contributions from API response
                        const features = data.feature_contributions || { };

                        for (const [key, value] of Object.entries(features)) {
                const label = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                        contribContainer.innerHTML += `
                        <div>
                            <div class="flex justify-between text-[10px] uppercase font-bold text-slate-400 mb-1">
                                <span>${label}</span>
                                <span>${(value * 100).toFixed(1)}%</span>
                            </div>
                            <div class="w-full bg-slate-200 rounded-full h-2">
                                <div class="bg-indigo-500 h-2 rounded-full transition-all duration-1000" style="width: ${value * 100}%"></div>
                            </div>
                        </div>
                `;
            }
